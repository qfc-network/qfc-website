<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2847"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="50%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="txt2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg2)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.3"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring)" stroke-width="1" opacity="0.15"/>

  <!-- Hexagon background shape -->
  <polygon points="256,80 406,167 406,345 256,432 106,345 106,167" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.2"/>

  <!-- QFC text - bold centered -->
  <g filter="url(#glow2)">
    <text x="256" y="285" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="160" font-weight="800" letter-spacing="12" fill="url(#txt2)" text-anchor="middle">QFC</text>
  </g>

  <!-- Dots on hexagon vertices -->
  <circle cx="256" cy="80" r="3" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="406" cy="167" r="3" fill="#4fc3f7" opacity="0.4"/>
  <circle cx="406" cy="345" r="3" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="256" cy="432" r="3" fill="#4fc3f7" opacity="0.4"/>
  <circle cx="106" cy="345" r="3" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="106" cy="167" r="3" fill="#4fc3f7" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="256" y="345" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" letter-spacing="16" fill="#4fc3f7" opacity="0.5" text-anchor="middle">NETWORK</text>
</svg>
